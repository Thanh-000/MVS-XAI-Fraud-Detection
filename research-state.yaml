project: MVS-XAI v2 Fraud Detection
phase: BOOTSTRAP
status: INITIALIZED
direction: DEEPEN
current_focus: "Establish baseline tabular and sequential model pipelines on PaySim"
hypotheses:
  H1: "Combining tabular (engineered ratios) and sequential (LSTM) views will outperform individual monolithic baselines by capturing both instance-level and temporal dynamics."
  H2: "Confidence-based OOF gating reduces variance in the meta-learner by rejecting uncertain predictions."
  H3: "MVS-XAI can satisfy fairness metrics (Demographic Parity, Equalized Odds) and XAI requirements while preserving high F1."
datasets:
  - name: PaySim
    status: PENDING
    records: 6.3M
  - name: IEEE-CIS
    status: PENDING
    records: 590K
models:
  tabular: [RF, XGBoost, LightGBM, CatBoost]
  sequential: [LSTM]
  meta: LogisticRegression
